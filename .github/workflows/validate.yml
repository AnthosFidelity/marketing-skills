name: Validate skills

on:
  pull_request:
    paths:
      - "skills/**"
      - ".claude-plugin/**"
      - "README.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "validate-skills.sh"
      - ".github/workflows/validate.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [main]

jobs:
  validate-skills:
    name: validate-skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validate-skills.sh
        run: |
          chmod +x ./validate-skills.sh
          ./validate-skills.sh
