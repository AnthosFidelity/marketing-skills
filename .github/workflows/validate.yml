name: Validate skills

on:
  pull_request:
    paths:
      - "skills/**"
      - "README.md"
      - "AGENTS.md"
      - "validate-skills.sh"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validate-skills.sh
        run: |
          chmod +x ./validate-skills.sh
          ./validate-skills.sh
